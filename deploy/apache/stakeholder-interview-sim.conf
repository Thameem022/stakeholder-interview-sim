# Apache reverse-proxy for stakeholder-interview-sim
# Required modules: proxy proxy_http proxy_wstunnel headers rewrite ssl
#   sudo a2enmod proxy proxy_http proxy_wstunnel headers rewrite ssl

<VirtualHost *:80>
    ServerName interviewsimulator.wpi.edu
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName interviewsimulator.wpi.edu
    ServerAdmin webmaster@wpi.edu

    SSLEngine on
    SSLCertificateFile /etc/incommon/fullchain.pem
    SSLCertificateKeyFile /etc/incommon/privkey.pem

    # WebSocket route (must come BEFORE the catch-all /)
    # The interview audio loop runs over wss://.../ws/interview/{session_id}
    ProxyPass        /ws/  ws://127.0.0.1:8000/ws/  keepalive=On  timeout=600
    ProxyPassReverse /ws/  ws://127.0.0.1:8000/ws/

    # All HTTP traffic (REST API + React static)
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass        /  http://127.0.0.1:8000/  timeout=600 keepalive=On
    ProxyPassReverse /  http://127.0.0.1:8000/

    ErrorLog  ${APACHE_LOG_DIR}/stakeholder-interview-sim_error.log
    CustomLog ${APACHE_LOG_DIR}/stakeholder-interview-sim_access.log combined
</VirtualHost>
