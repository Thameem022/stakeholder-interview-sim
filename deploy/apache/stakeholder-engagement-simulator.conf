# Apache reverse-proxy for stakeholder-engagement-simulator.wpi.edu
#
# Coexists on the same Ubuntu host as interviewsimulator.wpi.edu (old app on
# :8000). This app listens on 127.0.0.1:8001.
#
# Required modules:
#   sudo a2enmod proxy proxy_http headers rewrite ssl
#
# NOTE: This app uses WebRTC directly from the browser to OpenAI for the
# realtime audio loop — no `mod_proxy_wstunnel` and no `/ws/` proxy needed.

<VirtualHost *:80>
    ServerName stakeholder-engagement-simulator.wpi.edu
    RewriteEngine On
    RewriteCond %{HTTPS} !=on
    RewriteRule ^/(.*)$ https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName stakeholder-engagement-simulator.wpi.edu
    ServerAdmin webmaster@wpi.edu

    SSLEngine on
    SSLCertificateFile      /etc/incommon/stakeholder-engagement-simulator.wpi.edu.crt
    SSLCertificateKeyFile   /etc/incommon/stakeholder-engagement-simulator.wpi.edu.key
    SSLCertificateChainFile /etc/incommon/stakeholder-engagement-simulator.wpi.edu.chain.crt

    # REST API + static React app served from FastAPI at 127.0.0.1:8001.
    # `timeout=600` keeps long-running eval requests (IQR+SIC scoring can take
    # 15–30s) from being cut off by the proxy.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass        /  http://127.0.0.1:8001/  timeout=600 keepalive=On
    ProxyPassReverse /  http://127.0.0.1:8001/

    ErrorLog  ${APACHE_LOG_DIR}/stakeholder-engagement-simulator_error.log
    CustomLog ${APACHE_LOG_DIR}/stakeholder-engagement-simulator_access.log combined
</VirtualHost>
